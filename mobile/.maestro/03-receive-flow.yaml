appId: io.pezkuwichain.wallet
name: "E2E: Receive Screen"
---
# From wallet screen
- assertVisible: "HEZ"

# Tap Receive
- tapOn:
    text: "Receive"

# Receive Screen
- assertVisible: "Receive"
- assertVisible: "Share your address"
- assertVisible: "Copy Address"
- assertVisible: "Share"

# QR code should be visible
- assertVisible:
    text: "5G"
    optional: true

# Go back
- back
